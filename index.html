<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <div class="display">
                <div class="previous-operand"></div>
                <div class="current-operand">0</div>
            </div>
            <div class="buttons">
                <button class="btn clean" data-action="clear">AC</button>
                <button class="btn delete" data-action="delete">DEL</button>
                <button class="btn operator" data-action="operator">%</button>
                <button class="btn operator" data-action="operator">÷</button>

                <button class="btn number" data-action="number">7</button>
                <button class="btn number" data-action="number">8</button>
                <button class="btn number" data-action="number">9</button>
                <button class="btn operator" data-action="operator">×</button>

                <button class="btn number" data-action="number">4</button>
                <button class="btn number" data-action="number">5</button>
                <button class="btn number" data-action="number">6</button>
                <button class="btn operator" data-action="operator">-</button>

                <button class="btn number" data-action="number">1</button>
                <button class="btn number" data-action="number">2</button>
                <button class="btn number" data-action="number">3</button>
                <button class="btn operator" data-action="operator">+</button>

                <button class="btn number zero" data-action="number">0</button>
                <button class="btn number" data-action="number">.</button>
                <button class="btn equals" data-action="calculate">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
